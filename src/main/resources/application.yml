spring:
  application:
    name: cts-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cts_db}
    username: ${SPRING_DATASOURCE_USERNAME:cts_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cts_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 16

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: "${APP_JWT_SECRET:please-set-APP_JWT_SECRET-in-env-min-32-chars}"
    expiration: ${APP_JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health, info